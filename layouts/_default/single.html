{{ define "main" }}
<main class="min-h-screen bg-brand-bg py-20">
    <article class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- Header -->
        <div class="mb-12">
            <a href="/"
                class="inline-flex items-center gap-2 text-brand-purple hover:text-brand-lightPurple transition-colors mb-6">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
                Back to Home
            </a>
            <h1 class="font-display text-4xl md:text-5xl font-bold text-brand-dark mb-4">{{ .Title }}</h1>
            <div class="h-1 w-20 bg-brand-lime rounded-full"></div>
        </div>

        <!-- Content -->
        <div class="prose prose-lg prose-slate max-w-none">
            <style>
                .prose h1 {
                    font-family: 'Space Grotesk', sans-serif;
                    font-size: 2rem;
                    font-weight: 700;
                    color: #0F172A;
                    margin-top: 2rem;
                    margin-bottom: 1rem;
                }

                .prose h2 {
                    font-family: 'Space Grotesk', sans-serif;
                    font-size: 1.5rem;
                    font-weight: 600;
                    color: #0F172A;
                    margin-top: 2rem;
                    margin-bottom: 0.75rem;
                }

                .prose p {
                    font-family: 'Inter', sans-serif;
                    line-height: 1.75;
                    color: #334155;
                    margin-bottom: 1rem;
                }

                .prose strong {
                    font-weight: 600;
                    color: #0F172A;
                }

                .prose ul {
                    margin-top: 1rem;
                    margin-bottom: 1rem;
                    padding-left: 1.5rem;
                }

                .prose li {
                    margin-bottom: 0.5rem;
                    color: #334155;
                }

                .prose a {
                    color: #6D28D9;
                    text-decoration: underline;
                    transition: color 0.2s;
                }

                .prose a:hover {
                    color: #8B5CF6;
                }
            </style>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 md:p-12">
                {{ .Content }}
            </div>
        </div>

        <!-- Footer Navigation -->
        <div class="mt-12 pt-8 border-t border-slate-200">
            <div class="flex justify-between items-center">
                <a href="/" class="text-slate-600 hover:text-brand-purple transition-colors font-medium">
                    ← Back to Home
                </a>
                <p class="text-slate-500 text-sm">Last updated: {{ .Lastmod.Format "January 2, 2006" }}</p>
            </div>
        </div>
    </article>
</main>
{{ end }}
