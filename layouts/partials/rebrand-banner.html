<!-- Rebrand Banner - Shows when utm_source=beeyo.ai -->
<div id="rebrand-banner" style="display: none; position: relative; width: 100%; background: linear-gradient(to right, #fffbeb, #ffedd5, #fffbeb); border-bottom: 1px solid #fde68a; padding: 0.5rem 1rem;">
    <div style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-size: 0.875rem; text-align: center; flex-wrap: wrap;">
        <span style="color: #78350f;">
            We have rebranded from <strong>beeyo</strong> to <strong>hemline</strong>.
        </span>
        <a 
            href="/blog/from-beeyo-to-hemline"
            id="rebrand-blog-link"
            style="color: #78350f; font-weight: 500; text-decoration: underline; text-underline-offset: 2px; display: inline-flex; align-items: center; gap: 0.25rem;"
        >
            To know more read this blog
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
        </a>
    </div>
    <button 
        id="rebrand-dismiss-btn"
        type="button"
        aria-label="Dismiss banner"
        style="position: absolute; right: 0.5rem; top: 0.5rem; background: transparent; border: none; padding: 0.25rem; color: #a16207; cursor: pointer; border-radius: 0.25rem; display: flex; align-items: center; justify-content: center;"
        onclick="dismissRebrandBanner()"
    >
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </button>
</div>

<style>
@media (max-width: 640px) {
    #rebrand-banner {
        padding: 0.75rem 2.5rem 0.75rem 1rem !important;
    }
    #rebrand-banner > div {
        flex-direction: column !important;
        gap: 0.25rem !important;
        font-size: 0.8125rem !important;
    }
}
</style>

<script>
(function() {
    const params = new URLSearchParams(window.location.search);
    const utmSource = params.get('utm_source');

    // Only show banner if utm_source=beeyo.ai is in the current URL
    const isBeeyoSource = utmSource === 'beeyo.ai';

    // Check if already dismissed in this tab
    const isDismissed = sessionStorage.getItem('rebrand-banner-dismissed');

    if (isBeeyoSource && !isDismissed) {
        const banner = document.getElementById('rebrand-banner');
        if (banner) {
            banner.style.display = 'block';

            // Hide when blog link is clicked
            const blogLink = document.getElementById('rebrand-blog-link');
            if (blogLink) {
                blogLink.addEventListener('click', function() {
                    sessionStorage.setItem('rebrand-banner-dismissed', 'true');
                });
            }
        }
    }
})();

function dismissRebrandBanner() {
    const banner = document.getElementById('rebrand-banner');
    if (banner) {
        banner.style.display = 'none';
    }
    sessionStorage.setItem('rebrand-banner-dismissed', 'true');
}
</script>
