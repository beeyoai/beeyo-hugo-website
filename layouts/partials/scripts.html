<!-- Init Icons -->
<script>
    lucide.createIcons();

    // Simple Navbar Scroll Effect
    window.addEventListener('scroll', () => {
        const nav = document.getElementById('navbar');
        if (window.scrollY > 50) {
            nav.classList.add('shadow-md');
            nav.classList.replace('bg-white/70', 'bg-white/95');
        } else {
            nav.classList.remove('shadow-md');
            nav.classList.replace('bg-white/95', 'bg-white/70');
        }
    });

    // Mobile Menu Toggle
    const menuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');

    menuBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
    });

    // Waitlist Form Submission to Google Sheets
    const scriptURL = '{{ .Site.Params.googleSheetsScriptURL }}';

    const form = document.getElementById('waitlist-form');
    const btn = document.getElementById('submit-btn');
    const msg = document.getElementById('form-message');

    form.addEventListener('submit', e => {
        e.preventDefault();

        // UI Loading State
        const originalBtnContent = btn.innerHTML;
        btn.innerHTML = '<span>Sending...</span>';
        btn.disabled = true;

        fetch(scriptURL, { method: 'POST', body: new FormData(form) })
            .then(response => {
                // Success State
                msg.innerText = "You're on the list! Watch your inbox.";
                msg.classList.remove('hidden');
                msg.classList.remove('text-red-500');
                msg.classList.add('text-brand-purple');
                form.reset();
                btn.innerHTML = originalBtnContent;
                btn.disabled = false;
                lucide.createIcons(); // Reinitialize icons after innerHTML change
            })
            .catch(error => {
                // Error State
                msg.innerText = "Something went wrong. Please try again.";
                msg.classList.remove('hidden');
                msg.classList.remove('text-brand-purple');
                msg.classList.add('text-red-500');
                btn.innerHTML = originalBtnContent;
                btn.disabled = false;
                console.error('Error!', error.message);
                lucide.createIcons(); // Reinitialize icons after innerHTML change
            });
    });
</script>
